{% extends "base.html" %}

{% block title %}登录 - 在问AI代理{% endblock %}

{% block content %}
<h2 class="text-center mb-4" style="color: #667eea;">
    <i class="bi bi-shield-lock"></i> 在问AI 登录
</h2>
<form id="loginForm">
    <div class="mb-3">
        <label for="phone" class="form-label">手机号</label>
        <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-phone"></i></span>
            <input type="text" class="form-control border-start-0" id="phone" name="phone" required placeholder="请输入手机号">
        </div>
    </div>
    <div class="mb-3">
        <label for="code" class="form-label">验证码</label>
        <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-key"></i></span>
            <input type="text" class="form-control border-start-0" id="code" name="code" required placeholder="请输入验证码">
            <button class="btn btn-outline-gradient" type="button" id="sms-btn" onclick="sendSMS()">获取验证码</button>
        </div>
    </div>
    <div class="mb-3">
        <label for="invite_code" class="form-label">邀请码 <small class="text-muted">(可选)</small></label>
        <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-gift"></i></span>
            <input type="text" class="form-control border-start-0" id="invite_code" name="invite_code" placeholder="如有邀请码请填写">
        </div>
    </div>
    <button type="submit" class="btn btn-gradient w-100 py-2">登录</button>
</form>
<div id="message" class="mt-3 text-center text-success fw-bold"></div>
{% endblock %}

{% block scripts %}
<script>
    let countdown = 0;
    const smsBtn = document.getElementById('sms-btn');
    const phoneInput = document.getElementById('phone');
    const messageDiv = document.getElementById('message');

    async function sendSMS() {
        const phone = phoneInput.value.trim();
        if (!phone) {
            alert('请输入手机号');
            return;
        }
        smsBtn.disabled = true;
        let seconds = 60;
        smsBtn.textContent = `已发送(${seconds}s)`;
        const interval = setInterval(() => {
            seconds--;
            smsBtn.textContent = `已发送(${seconds}s)`;
            if (seconds <= 0) {
                clearInterval(interval);
                smsBtn.disabled = false;
                smsBtn.textContent = '获取验证码';
            }
        }, 1000);

        try {
            const formData = new FormData();
            formData.append('phone', phone);
            const res = await fetch('/send-sms', {
                method: 'POST',
                body: formData
            });
            if (!res.ok) {
                const err = await res.text();
                throw new Error(err);
            }
            const data = await res.json();
            messageDiv.textContent = data.message;
        } catch (e) {
            messageDiv.textContent = '发送失败：' + e.message;
            clearInterval(interval);
            smsBtn.disabled = false;
            smsBtn.textContent = '获取验证码';
        }
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const phone = document.getElementById('phone').value.trim();
        const code = document.getElementById('code').value.trim();
        const invite = document.getElementById('invite_code').value.trim();

        if (!phone || !code) {
            alert('手机号和验证码不能为空');
            return;
        }

        const formData = new FormData();
        formData.append('phone', phone);
        formData.append('code', code);
        formData.append('invite_code', invite);

        try {
            const res = await fetch('/login', {
                method: 'POST',
                body: formData
            });
            if (!res.ok) {
                const err = await res.text();
                throw new Error(err);
            }
            const data = await res.json();
            alert('登录成功！');
            window.location.href = '/';
        } catch (e) {
            messageDiv.textContent = '登录失败：' + e.message;
        }
    });
</script>
{% endblock %}
